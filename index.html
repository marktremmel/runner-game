<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Sky Runner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f9ff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #1e293b;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.7);
            z-index: 20;
            color: #1e293b;
            backdrop-filter: blur(8px);
        }
        .difficulty-btn {
            @apply px-6 py-3 rounded-xl font-bold text-sm transition-all transform hover:scale-105 active:scale-95 border-2 shadow-lg;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="text-xs uppercase tracking-widest font-bold opacity-60">Distance Traveled</div>
        <div id="score" class="text-5xl font-black text-blue-600">0m</div>
        <div id="difficulty-label" class="text-[10px] uppercase tracking-widest text-slate-500 mt-1 font-bold">Mode: Beginner</div>
    </div>

    <div id="controls-hint">A/D: Move • Space: Jump • S: Fast Fall</div>

    <div id="overlay">
        <div class="text-center p-10 bg-white border-4 border-blue-500 rounded-[3rem] max-w-sm w-full shadow-2xl">
            <h1 id="msg-title" class="text-4xl font-black mb-2 text-blue-600">SKY RUNNER</h1>
            <p id="msg-body" class="mb-8 text-slate-600 font-medium text-lg">TOKYO HIGHWAY<br>Avoid lasers and rogue drones!</p>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="startGame('easy')" class="difficulty-btn border-emerald-400 text-emerald-600 bg-emerald-50 hover:bg-emerald-100">BEGINNER</button>
                <button onclick="startGame('middle')" class="difficulty-btn border-blue-400 text-blue-600 bg-blue-50 hover:bg-blue-100">PRO</button>
                <button onclick="startGame('hard')" class="difficulty-btn border-orange-400 text-orange-600 bg-orange-50 hover:bg-orange-100">ELITE</button>
                <button onclick="startGame('extreme')" class="difficulty-btn border-red-500 text-red-600 bg-red-50 hover:bg-red-100">LEGEND</button>
            </div>
            
            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest italic">Watch out for moving obstacles!</p>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player, playerBody, playerHead, playerLimbs = [], playerShadow, clock;
        let obstacles = [];
        let collectibles = [];
        let buildings = [];
        let gameActive = false;
        let isSplitting = false;
        let score = 0;
        let speed = 0.5;
        let acceleration = 0.0001;
        let lanes = [-4, 0, 4];
        let targetLane = 1; 
        
        let isJumping = false;
        let jumpVelocity = 0;
        const GRAVITY = -0.015;
        const JUMP_FORCE = 0.45;
        const SLAM_FORCE = -0.6;
        
        let mouseX = 0;

        const DIFF_SETTINGS = {
            easy: { startSpeed: 0.4, accel: 0.00005, label: "Beginner" },
            middle: { startSpeed: 0.6, accel: 0.0001, label: "Pro" },
            hard: { startSpeed: 0.8, accel: 0.0002, label: "Elite" },
            extreme: { startSpeed: 1.1, accel: 0.0004, label: "Legend" }
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xbae6fd); 
            scene.fog = new THREE.Fog(0xbae6fd, 30, 200);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 14);
            camera.lookAt(0, 3, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x888888, 1);
            scene.add(hemiLight);
            
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(20, 40, 20);
            scene.add(sun);

            // Floating High-Tech Track
            const floorGeo = new THREE.PlaneGeometry(16, 2000);
            const floorMat = new THREE.MeshPhongMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.6,
                side: THREE.DoubleSide 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.z = -900;
            scene.add(floor);

            const grid = new THREE.GridHelper(2000, 120, 0x3b82f6, 0xffffff);
            grid.position.y = 0.05;
            grid.position.z = -900;
            scene.add(grid);

            createTokyoBackground();

            // Create Human Character
            player = new THREE.Group();
            
            const torsoGeo = new THREE.CylinderGeometry(0.3, 0.25, 0.8, 12);
            const torsoMat = new THREE.MeshPhongMaterial({ color: 0x1e293b });
            playerBody = new THREE.Mesh(torsoGeo, torsoMat);
            playerBody.position.y = 1.3;
            player.add(playerBody);

            const headGeo = new THREE.SphereGeometry(0.28, 16, 16);
            const headMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
            playerHead = new THREE.Mesh(headGeo, headMat);
            playerHead.position.y = 1.95;
            player.add(playerHead);

            const limbGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.7, 8);
            const limbMat = new THREE.MeshPhongMaterial({ color: 0x1e293b });

            const createLimb = (x, y, z) => {
                const limb = new THREE.Mesh(limbGeo, limbMat);
                limb.position.set(x, y, z);
                player.add(limb);
                return limb;
            };

            playerLimbs.push(createLimb(0.4, 1.4, 0));  // R Arm
            playerLimbs.push(createLimb(-0.4, 1.4, 0)); // L Arm
            playerLimbs.push(createLimb(0.18, 0.5, 0)); // R Leg
            playerLimbs.push(createLimb(-0.18, 0.5, 0));// L Leg

            player.position.y = 0.2; 
            scene.add(player);

            playerShadow = new THREE.Mesh(
                new THREE.CircleGeometry(0.7, 32),
                new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.2 })
            );
            playerShadow.rotation.x = -Math.PI / 2;
            playerShadow.position.y = 0.06;
            scene.add(playerShadow);

            clock = new THREE.Clock();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('mousemove', (e) => mouseX = (e.clientX / window.innerWidth) - 0.5);
        }

        function createTokyoBackground() {
            for(let i = 0; i < 60; i++) {
                const h = 50 + Math.random() * 100;
                const w = 15 + Math.random() * 20;
                const b = new THREE.Mesh(
                    new THREE.BoxGeometry(w, h, w),
                    new THREE.MeshPhongMaterial({ color: 0xcbd5e1 })
                );
                const side = Math.random() > 0.5 ? 1 : -1;
                b.position.set((50 + Math.random() * 70) * side, h/2 - 30, -Math.random() * 1200);
                
                // Tech panels
                const sign = new THREE.Mesh(
                    new THREE.PlaneGeometry(w * 0.7, 10),
                    new THREE.MeshBasicMaterial({ color: 0x3b82f6, side: THREE.DoubleSide })
                );
                sign.position.set(0, (Math.random() * (h/3)), w/2 + 0.1);
                b.add(sign);

                scene.add(b);
                buildings.push(b);
            }
        }

        function spawnObstacle() {
            if (!gameActive || isSplitting) return;
            
            const type = Math.random();
            if (type < 0.6) {
                // Classic Laser
                const group = new THREE.Group();
                const laneX = lanes[Math.floor(Math.random() * 3)];
                const isHorizontal = Math.random() > 0.5;
                
                const core = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.1, 0.1, 16, 8),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                const glow = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.4, 16, 8),
                    new THREE.MeshBasicMaterial({ color: 0xef4444, transparent: true, opacity: 0.6 })
                );
                group.add(core, glow);

                if (isHorizontal) {
                    group.rotation.z = Math.PI / 2;
                    const h = 2 + (Math.random() * 2);
                    group.position.set(laneX, h, -250);
                } else {
                    group.position.set(laneX, 8, -250);
                }
                scene.add(group);
                obstacles.push({ mesh: group, type: 'laser', horizontal: isHorizontal, x: laneX, y: group.position.y });
            } else {
                // Moving Distraction Drone
                const drone = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 1, 2),
                    new THREE.MeshPhongMaterial({ color: 0x475569 })
                );
                const light = new THREE.Mesh(
                    new THREE.SphereGeometry(0.3),
                    new THREE.MeshBasicMaterial({ color: 0xfacc15 })
                );
                light.position.y = 0.5;
                drone.add(body, light);
                
                const startX = lanes[Math.floor(Math.random() * 3)];
                drone.position.set(startX, 2, -250);
                scene.add(drone);
                obstacles.push({ 
                    mesh: drone, 
                    type: 'drone', 
                    x: startX, 
                    phase: Math.random() * Math.PI * 2,
                    speed: 2 + Math.random() * 3
                });
            }
        }

        function spawnCollectible() {
            if (!gameActive || isSplitting) return;
            const mesh = new THREE.Mesh(
                new THREE.TorusGeometry(0.5, 0.15, 12, 24),
                new THREE.MeshPhongMaterial({ color: 0x3b82f6, emissive: 0x1d4ed8 })
            );
            mesh.position.set(lanes[Math.floor(Math.random() * 3)], 1.5, -200);
            scene.add(mesh);
            collectibles.push(mesh);
        }

        function onKeyDown(e) {
            if (!gameActive || isSplitting) return;
            if (e.key === 'a' || e.key === 'ArrowLeft') if (targetLane > 0) targetLane--;
            if (e.key === 'd' || e.key === 'ArrowRight') if (targetLane < 2) targetLane++;
            if ((e.key === ' ' || e.key === 'w' || e.key === 'ArrowUp') && !isJumping) {
                isJumping = true; jumpVelocity = JUMP_FORCE;
            }
            if ((e.key === 's' || e.key === 'ArrowDown') && isJumping) jumpVelocity = SLAM_FORCE;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function startGame(mode) {
            const settings = DIFF_SETTINGS[mode];
            speed = settings.startSpeed;
            acceleration = settings.accel;
            document.getElementById('difficulty-label').innerText = "Mode: " + settings.label;

            obstacles.forEach(o => scene.remove(o.mesh));
            collectibles.forEach(c => scene.remove(c));
            obstacles = []; collectibles = []; score = 0; targetLane = 1;
            
            isSplitting = false;
            playerHead.position.set(0, 1.95, 0);
            playerBody.position.set(0, 1.3, 0);
            playerHead.rotation.set(0,0,0);
            playerBody.rotation.set(0,0,0);
            player.position.set(lanes[targetLane], 0.2, 0);
            
            playerLimbs.forEach((l, i) => {
                l.rotation.set(0,0,0);
                l.position.y = (i < 2) ? 1.4 : 0.5;
            });

            isJumping = false; jumpVelocity = 0; gameActive = true;
            document.getElementById('overlay').style.display = 'none';
        }

        function triggerSplitAnimation() {
            gameActive = false;
            isSplitting = true;
            setTimeout(gameOver, 1500);
        }

        function gameOver() {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('msg-title').innerText = "GAME OVER";
            document.getElementById('msg-title').style.color = "#ef4444";
            document.getElementById('msg-body').innerHTML = `You were intercepted!<br>Distance: <b>${Math.floor(score)}m</b>`;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!clock) return;
            const delta = clock.getDelta();
            const time = Date.now() * 0.005;

            if (isSplitting) {
                playerHead.position.y += 0.2;
                playerHead.position.z += 0.3;
                playerBody.position.y -= 0.15;
                playerLimbs.forEach(l => {
                    l.position.x += (Math.random() - 0.5) * 0.4;
                    l.position.y += (Math.random() - 0.5) * 0.4;
                    l.rotation.z += 0.2;
                });
            }

            if (gameActive) {
                score += speed;
                document.getElementById('score').innerText = `${Math.floor(score)}m`;
                speed += acceleration;

                player.position.x = THREE.MathUtils.lerp(player.position.x, lanes[targetLane], 0.15);
                playerShadow.position.x = player.position.x;

                if (!isJumping) {
                    const cycle = Math.sin(time * speed * 20);
                    playerLimbs[0].rotation.x = cycle;
                    playerLimbs[1].rotation.x = -cycle;
                    playerLimbs[2].rotation.x = -cycle;
                    playerLimbs[3].rotation.x = cycle;
                    player.position.y = 0.2 + Math.abs(cycle) * 0.1;
                } else {
                    player.position.y += jumpVelocity;
                    jumpVelocity += GRAVITY;
                    if (player.position.y <= 0.2) {
                        player.position.y = 0.2;
                        isJumping = false; jumpVelocity = 0;
                    }
                }

                buildings.forEach(b => {
                    b.position.z += speed * 70 * delta;
                    if(b.position.z > 200) b.position.z = -1000;
                });

                if (Math.random() < 0.05) spawnObstacle();
                if (Math.random() < 0.01) spawnCollectible();

                obstacles.forEach((obj, i) => {
                    obj.mesh.position.z += speed * 140 * delta;
                    
                    // Drone movement
                    if (obj.type === 'drone') {
                        obj.mesh.position.x = obj.x + Math.sin(time * obj.speed + obj.phase) * 3;
                    }

                    const distZ = Math.abs(obj.mesh.position.z - player.position.z);
                    const distX = Math.abs(obj.mesh.position.x - player.position.x);
                    
                    if (distZ < 1.2 && distX < 1.6) {
                        if (obj.type === 'laser') {
                            if (obj.horizontal) {
                                const charTop = player.position.y + 2.4;
                                const charBottom = player.position.y;
                                if (obj.y > charBottom && obj.y < charTop) triggerSplitAnimation();
                            } else {
                                triggerSplitAnimation();
                            }
                        } else {
                            // Drone collision
                            if (Math.abs(obj.mesh.position.y - player.position.y) < 2) triggerSplitAnimation();
                        }
                    }

                    if (obj.mesh.position.z > 20) {
                        scene.remove(obj.mesh);
                        obstacles.splice(i, 1);
                    }
                });

                collectibles.forEach((obj, i) => {
                    obj.position.z += speed * 140 * delta;
                    obj.rotation.y += 0.1;
                    if (player.position.distanceTo(obj.position) < 2.5) {
                        score += 500;
                        scene.remove(obj);
                        collectibles.splice(i, 1);
                    }
                    if (obj.position.z > 20) {
                        scene.remove(obj);
                        collectibles.splice(i, 1);
                    }
                });
                
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, mouseX * 10, 0.05);
                camera.lookAt(player.position.x, 4, -10);
            }

            renderer.render(scene, camera);
        }

        window.onload = function() {
            init();
            animate();
        }
    </script>
</body>
</html>
